name: web-portal-ci

on:
  pull_request:
    branches: [main]
    paths:
      - "web-portal/**"
      - ".github/workflows/web-portal-ci.yml"

jobs:
  verify:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web-portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check
